  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --text-primary: #0a0a0a;
      --text-secondary: #6b6b6b;
      --border: #e8e8e8;
      --hover-bg: #f7f7f7;
      --shadow-hover: 0 4px 16px rgba(0,0,0,0.07);
      --toggle-bg: #f0f0f0;
      --toggle-hover: #e4e4e4;
    }

    [data-theme="dark"] {
      --bg: #0e0e0e;
      --text-primary: #f0f0f0;
      --text-secondary: #888888;
      --border: #2a2a2a;
      --hover-bg: #1a1a1a;
      --shadow-hover: 0 4px 16px rgba(0,0,0,0.4);
      --toggle-bg: #1e1e1e;
      --toggle-hover: #2a2a2a;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 56px 24px;
      transition: background 0.25s ease, color 0.25s ease;
    }

    /* ── Toggle ── */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--toggle-bg);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .theme-toggle:hover {
      background: var(--toggle-hover);
    }

    .theme-toggle svg {
      width: 16px;
      height: 16px;
    }

    .icon-sun  { display: none; }
    .icon-moon { display: block; }

    [data-theme="dark"] .icon-sun  { display: block; }
    [data-theme="dark"] .icon-moon { display: none; }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    /* ── Profile ── */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
      animation: fadeUp 0.5s ease both;
    }

    .avatar-wrap {
      width: 96px;
      height: 96px;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid var(--border);
      display: block;
      transition: transform 0.3s ease;
    }

    .avatar-wrap:hover .avatar {
      transform: scale(1.04);
    }

    .profile-name {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .profile-bio {
      font-size: 0.82rem;
      color: var(--text-secondary);
      font-weight: 300;
      line-height: 1.6;
      max-width: 260px;
    }

    /* ── Links ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 20px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      text-decoration: none;
      color: var(--text-primary);
      font-size: 0.84rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: background 0.18s ease, border-color 0.18s ease,
                  transform 0.18s ease, box-shadow 0.18s ease;
      opacity: 0;
      animation: fadeUp 0.4s ease both;
    }

    .link-btn:hover {
      background: var(--hover-bg);
      border-color: #c8c8c8;
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .link-btn svg {
      flex-shrink: 0;
      width: 17px;
      height: 17px;
      opacity: 0.6;
    }

    .link-btn .label-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .link-btn .sub {
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--text-secondary);
      letter-spacing: 0;
    }

    .link-btn:nth-child(1) { animation-delay: 0.15s; }
    .link-btn:nth-child(2) { animation-delay: 0.22s; }
    .link-btn:nth-child(3) { animation-delay: 0.29s; }
    .link-btn:nth-child(4) { animation-delay: 0.36s; }
    .link-btn:nth-child(5) { animation-delay: 0.43s; }
    .link-btn:nth-child(6) { animation-delay: 0.50s; }
    .link-btn:nth-child(7) { animation-delay: 0.57s; }

    /* ── Footer ── */
    .footer {
      font-size: 0.7rem;
      color: var(--text-secondary);
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      animation: fadeUp 0.4s 0.55s ease both;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>

  <script>
    // Applica il tema salvato prima del render per evitare flash
    const saved = localStorage.getItem('theme');
    const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', saved || preferred);
  </script>
</head>
