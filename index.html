<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rinaldi.visuals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --text-primary: #0a0a0a;
      --text-secondary: #6b6b6b;
      --border: #e8e8e8;
      --hover-bg: #f5f5f5;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* Profile */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid var(--border);
    }

    .profile-name {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .profile-bio {
      font-size: 0.82rem;
      color: var(--text-secondary);
      font-weight: 300;
      line-height: 1.5;
      max-width: 280px;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      text-decoration: none;
      color: var(--text-primary);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: background 0.15s ease, border-color 0.15s ease;
      cursor: pointer;
    }

    .link-btn:hover {
      background: var(--hover-bg);
      border-color: #c0c0c0;
    }

    .link-btn svg {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      opacity: 0.75;
    }

    /* Footer */
    .footer {
      font-size: 0.72rem;
      color: #c0c0c0;
      font-weight: 300;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="profile">
      <img
        class="avatar"
        src="https://ugc.production.linktr.ee/c177c842-ce51-4c22-a3f2-e857f031412b_Tavola-disegno-1-100.jpeg?io=true&size=avatar-v3_0"
        alt="rinaldi.visuals"
      />
      <p class="profile-name">rinaldi.visuals</p>
      <p class="profile-bio">Foggia, Italy &mdash; Graphic design &amp; photography</p>
    </div>

    <div class="links">

      <a class="link-btn" href="https://rinaldicristian92-hash.github.io/sito-portfolio-rinaldivisuals/" target="_blank" rel="noopener">
        <!-- Globe icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        Portfolio
      </a>

      <a class="link-btn" href="https://www.instagram.com/rinaldi.visuals" target="_blank" rel="noopener">
        <!-- Instagram icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
        </svg>
        Instagram
      </a>

      <a class="link-btn" href="http://linkedin.com/in/cristian-rinaldi-514b553a0" target="_blank" rel="noopener">
        <!-- LinkedIn icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
          <rect x="2" y="9" width="4" height="12"/>
          <circle cx="4" cy="4" r="2"/>
        </svg>
        LinkedIn
      </a>

      <a class="link-btn" href="https://www.facebook.com/Cristian%20Rinaldi" target="_blank" rel="noopener">
        <!-- Facebook icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
        </svg>
        Facebook
      </a>

    </div>

    <p class="footer">#madebycristianrinaldi</p>

  </div>
</body>
</html>
